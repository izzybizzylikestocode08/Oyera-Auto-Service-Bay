<!DOCTYPE html>
<html>
<head>
    <title>Oyera Auto Services - Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightgray;
            margin: 0;
        }

        .header {
            background-color:blueviolet;
            color:rgb(35, 4, 66);
            padding: 20px;
            text-align: center;
            background-image: url(./mechanic.jpg);
        }

        .container {
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 15px;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        h2 {
            color:purple;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Quick Access</h1>
    </div>

    <div class="container">

        <div class="card">
            <h2>Number of Technicians</h2>
            <p>120</p>
        </div>

        <div class="card">
            <h2>Number of cars</h2>
            <p>10</p>
        </div>

        <div class="card">
            <h2>Number of customers registered</h2>
            <p>15</p>
        </div>

    </div>

</body>
</html>
